version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rw-postgres
    environment:
      POSTGRES_DB: research_workspace
      POSTGRES_USER: rw_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rw_user -d research_workspace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rw-network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: rw-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rw-network

  # Backend API
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: rw-backend
    environment:
      DATABASE_URL: postgresql://rw_user:${DB_PASSWORD:-dev_password_123}@postgres:5432/research_workspace
      REDIS_URL: redis://redis:6379/0
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      PRESIGNED_URL_EXPIRES_IN: ${PRESIGNED_URL_EXPIRES_IN:-900}
      ENVIRONMENT: staging
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: 8000
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      # OIDC Configuration (optional for staging)
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      # Stripe (optional for staging)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      # Admin User
      ADMIN_USER_ID: ${ADMIN_USER_ID:-admin-staging}
      ADMIN_USER_EMAIL: ${ADMIN_USER_EMAIL:-admin@staging.local}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount source code for development
      - ./app/backend:/app
      # Mount uploads directory
      - backend_uploads:/app/uploads
      # Mount logs
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/database/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rw-network
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # MinIO Object Storage (Phase 2)
  minio:
    image: minio/minio:latest
    container_name: rw-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rw-network
    profiles:
      - minio

  # Frontend (optional - only if not running locally)
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: rw-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_FRONTEND_URL: http://localhost:3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - rw-network
    profiles:
      - frontend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: rw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - rw-network
    profiles:
      - nginx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  minio_data:
    driver: local

networks:
  rw-network:
    driver: bridge
